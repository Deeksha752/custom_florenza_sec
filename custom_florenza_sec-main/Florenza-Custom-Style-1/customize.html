<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customize Your T-shirt - Custom Florenza</title>
  <meta name="description" content="Customize your T-shirt with text, colors, and images." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #c9184a;
      --primary-light: #fde2e9;
      --bg: #fdf6f7;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --border: #f0dce2;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      text-align: center;
    }

    .customize-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 400px;
      margin: 2rem auto;
      text-align: left;
    }

    .customize-form input, .customize-form select {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 1rem;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin: 0.5rem;
    }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline { background: #fff; border: 1px solid var(--border); }

    #tshirt {
      width: 250px;
      height: 320px;
      border: 2px solid black;
      text-align: center;
      padding-top: 40px;
      margin: 2rem auto;
      background: white;
      position: relative;
    }

    #previewImage {
      max-width: 140px;
      display: block;
      margin: 0 auto 10px;
    }

    #previewText {
      font-size: 1.2rem;
      font-weight: 700;
    }

    /* Features Section */
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      padding: 4rem 2rem;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      background: #fff;
    }

    .feature-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      text-align: center;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .feature-card:hover {
      box-shadow: 0 8px 30px rgba(201,24,74,0.08);
      transform: translateY(-3px);
    }

    .feature-icon {
      width: 52px;
      height: 52px;
      background: var(--primary-light);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 1rem;
    }

    .feature-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .feature-card p {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Categories Section */
    .categories {
      background: #fff;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 4rem 2rem;
      text-align: center;
    }

    .categories h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 2.5rem;
    }

    .category-pills {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pill {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
      text-decoration: none;
    }

    .pill:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(201,24,74,0.25);
    }

    .price-range {
      font-weight: 400;
      font-size: 0.8rem;
      opacity: 0.7;
    }

    /* Contact Strip */
    .contact-strip {
      background: var(--primary);
      color: #fff;
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .contact-strip h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .contact-items {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 1rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
      text-decoration: none;
    }

    .contact-item:hover { color: #fff; text-decoration: underline; }

    /* Footer */
    footer {
      background: var(--text);
      color: #999;
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
    }

    footer span { color: var(--primary); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Customize Your T-shirt</h1>
    <p>Design your perfect T-shirt with custom text, colors, and images.</p>

    <div class="customize-form">
      <input id="name" placeholder="Enter Name" />
      <input id="customText" placeholder="Enter Design Text" oninput="updatePreviewText()" />
      <select id="size">
        <option value="S">Size S</option>
        <option value="M" selected>Size M</option>
        <option value="L">Size L</option>
        <option value="XL">Size XL</option>
      </select>
      <input type="color" id="colorPicker" onchange="changeColor()" value="#ffffff" />
      <input type="file" id="imageUpload" accept="image/*" onchange="uploadImage()" />
      <button type="button" onclick="downloadDesign()" class="btn btn-outline">Download Design</button>
      <button type="button" onclick="placeOrder()" class="btn btn-primary">Place Order</button>
    </div>

    <div id="tshirt">
      <img id="previewImage" />
      <span id="previewText">Your Design</span>
    </div>

    <a href="service.html">← Back to Services</a>
  </div>

  <footer>
    <p>© 2025 <span>Custom Florenza</span> — Designed by You, Crafted by Florenza. All rights reserved.</p>
  </footer>

  <script>
    let uploadedImageData = "";

    function placeOrder() {
      const name = document.getElementById("name").value;
      const design = document.getElementById("customText").value;
      const size = document.getElementById("size").value;

      fetch("http://localhost:5000/order", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          name: name,
          design: design,
          size: size
        })
      })
      .then(res => {
        if (!res.ok) {
          return res.text().then(text => { throw new Error(text || 'Server error'); });
        }
        return res.text();
      })
      .then(data => {
        alert("✅ Order placed successfully!");
        alert("📲 WhatsApp Message Sent:\nHi " + name + ", your T-shirt order is confirmed 👕");
        console.log("Server response:", data);
        window.location.href = "success.html";
      })
      .catch(err => {
        console.error("Order error:", err);
        alert("Something went wrong while placing your order. Please make sure the backend is running.");
      });
    }

    function changeColor() {
      const color = document.getElementById("colorPicker").value;
      document.getElementById("tshirt").style.backgroundColor = color;
    }

    function uploadImage() {
      const file = document.getElementById("imageUpload").files[0];
      const reader = new FileReader();

      reader.onload = function(e) {
        uploadedImageData = e.target.result;
        document.getElementById("previewImage").src = e.target.result;
      };

      if (file) {
        reader.readAsDataURL(file);
      }
    }

    function downloadDesign() {
      const tshirt = document.getElementById("tshirt");

      html2canvas(tshirt).then(canvas => {
        const link = document.createElement("a");
        link.download = "tshirt-design.png";
        link.href = canvas.toDataURL();
        link.click();
      });
    }

    function updatePreviewText() {
      const text = document.getElementById("customText").value || "Your Design";
      document.getElementById("previewText").textContent = text;
    }
  </script>
</body>
</html>
